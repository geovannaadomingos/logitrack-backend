# ==========================================================================
# LogiTrack Pro — Configuração da Aplicação
# ==========================================================================
# Arquivo:  src/main/resources/application.properties
# Perfil:   desenvolvimento (padrão)
# ==========================================================================

# --------------------------------------------------------------------------
# Servidor
# --------------------------------------------------------------------------
spring.application.name=logitrack-backend
server.port=8080

# Exibir o banner do Spring Boot no console ao iniciar
spring.main.banner-mode=console

# --------------------------------------------------------------------------
# DataSource — PostgreSQL
# --------------------------------------------------------------------------
# Formato: jdbc:postgresql://<host>:<porta>/<nome-do-banco>
# Altere usuário e senha conforme sua instalação local do PostgreSQL.
spring.datasource.url=jdbc:postgresql://localhost:5432/logitrack
spring.datasource.username=postgres
spring.datasource.password=postgres123
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexões HikariCP (incluído pelo Spring Boot automaticamente)
# Tamanho mínimo de conexões ativas no pool
spring.datasource.hikari.minimum-idle=2
# Tamanho máximo do pool (para desenvolvimento; em produção, ajuste conforme carga)
spring.datasource.hikari.maximum-pool-size=10
# Tempo máximo (ms) que o pool aguarda por uma conexão livre antes de lançar erro
spring.datasource.hikari.connection-timeout=30000
# Tempo máximo (ms) que uma conexão fica ociosa antes de ser descartada
spring.datasource.hikari.idle-timeout=600000
# Tempo máximo de vida (ms) de uma conexão no pool
spring.datasource.hikari.max-lifetime=1800000
# Query de validação de conexão (confirmação que o banco está respondendo)
spring.datasource.hikari.connection-test-query=SELECT 1

# --------------------------------------------------------------------------
# JPA / Hibernate
# --------------------------------------------------------------------------

# validate  → verifica se o schema do banco bate com as entidades JPA.
#             Não cria nem altera nenhuma tabela.
#             OBRIGATÓRIO rodar o schema.sql ANTES de subir a aplicação.
#
# Outros valores para referência:
#   create       → dropa e recria as tabelas (PERDA DE DADOS)
#   create-drop  → igual ao create, mas dropa ao encerrar (apenas testes)
#   update       → tenta atualizar o schema (NÃO recomendado em produção)
#   none         → não faz nada (produção)
spring.jpa.hibernate.ddl-auto=validate

# Exibe o SQL gerado pelo Hibernate no console (útil para debug)
spring.jpa.show-sql=true

# Formata o SQL exibido com indentação (legível no console)
spring.jpa.properties.hibernate.format_sql=true

# Dialeto PostgreSQL — garante geração de SQL otimizado para PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Habilita comentários Hibernate no SQL gerado (mostra de onde veio a query)
spring.jpa.properties.hibernate.use_sql_comments=true

# Estatísticas de sessão Hibernate (útil para detectar N+1 em dev)
spring.jpa.properties.hibernate.generate_statistics=false

# Desabilita o "Open Session in View" — evita LazyInitializationException silenciosa
# e força o carregamento correto dos dados nas camadas de serviço/repositório
spring.jpa.open-in-view=false

# --------------------------------------------------------------------------
# Serialização JSON (Jackson)
# --------------------------------------------------------------------------

# Datas como string ISO-8601 (ex.: "2026-04-01T08:00:00") em vez de timestamp numérico
spring.jackson.serialization.write-dates-as-timestamps=false

# Formato de data/hora para campos LocalDateTime
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# Formato de data para campos LocalDate (ex.: data_inicio de manutenção)
spring.jackson.serialization.write-dates-with-context-time-zone=false

# Omitir campos nulos na resposta JSON
# Ex.: "fieldErrors" não aparece em respostas de erro quando não há erros de validação
spring.jackson.default-property-inclusion=non_null

# --------------------------------------------------------------------------
# CORS — Origens permitidas por ambiente
# --------------------------------------------------------------------------
# Desenvolvimento: frontends rodando localmente nas portas mais comuns
# Produção: sobrescreva em application-prod.properties ou via variável de ambiente:
#   LOGITRACK_CORS_ALLOWED-ORIGINS=https://meusite.com.br
logitrack.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:4200

# --------------------------------------------------------------------------
# Logging — Níveis por pacote
# --------------------------------------------------------------------------

# Nível raiz da aplicação (INFO já mostra startup, endpoints, erros) 
logging.level.root=INFO

# Logs detalhados da aplicação LogiTrack (DEBUG para acompanhar regras de negócio)
logging.level.com.logitrack=DEBUG

# SQL gerado pelo Hibernate (exige show-sql=true acima)
logging.level.org.hibernate.SQL=DEBUG

# Parâmetros dos prepared statements — TRACE exibe valores reais (risco de vazar PII em produção)
# Habilitar apenas localmente para debug pontual de queries
logging.level.org.hibernate.orm.jdbc.bind=OFF

# Logs do HikariCP (conexões com o banco — INFO é suficiente)
logging.level.com.zaxxer.hikari=INFO

# Logs do HikariCP com detalhes do pool (DEBUG para diagnosticar problemas de conexão)
logging.level.com.zaxxer.hikari.HikariConfig=DEBUG

# Logs do Spring Data JPA
logging.level.org.springframework.data.jpa=DEBUG

# Logs de transações (útil para depurar problemas de transação)
logging.level.org.springframework.transaction=DEBUG

# --------------------------------------------------------------------------
# Actuator (opcional — remova se não quiser expor métricas)
# --------------------------------------------------------------------------
