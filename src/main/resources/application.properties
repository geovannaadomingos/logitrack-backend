# ==========================================================================
# LogiTrack Pro — Configuração da Aplicação
# ==========================================================================
# Arquivo:  src/main/resources/application.properties
# Perfil:   desenvolvimento (padrão)
# ==========================================================================

# --------------------------------------------------------------------------
# Servidor e Encoding
# --------------------------------------------------------------------------
spring.application.name=logitrack-backend
server.port=8080

# Configurações de Encoding para garantir suporte total a UTF-8 (Acentuação)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# Exibir o banner do Spring Boot no console ao iniciar
spring.main.banner-mode=console

# --------------------------------------------------------------------------
# DataSource — PostgreSQL
# --------------------------------------------------------------------------
# URL com parâmetros para garantir o uso de UTF-8 na conexão JDBC
spring.datasource.url=jdbc:postgresql://localhost:5432/logitrack?useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=postgres
spring.datasource.password=postgres123
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexões HikariCP
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# --------------------------------------------------------------------------
# JPA / Hibernate
# --------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.open-in-view=false

# --------------------------------------------------------------------------
# Serialização JSON (Jackson)
# --------------------------------------------------------------------------
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.serialization.write-dates-with-context-time-zone=false
spring.jackson.default-property-inclusion=non_null

# --------------------------------------------------------------------------
# CORS — Origens permitidas
# --------------------------------------------------------------------------
logitrack.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:4200

# --------------------------------------------------------------------------
# Logging
# --------------------------------------------------------------------------
logging.level.root=INFO
logging.level.com.logitrack=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.com.zaxxer.hikari=INFO
logging.level.com.zaxxer.hikari.HikariConfig=DEBUG
logging.level.org.springframework.data.jpa=DEBUG
logging.level.org.springframework.transaction=DEBUG
